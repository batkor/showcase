name: Main
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  phpunit:
    name: Run PHPUnit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: './modules/custom'

      - name: Prepare environment
        uses: './modules/custom/.github/actions/drupal-docker'
        with:
          directory: './modules/custom'

      - name: Finished
        run: ls -la ./
