name: Main
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  phpunit:
    name: Run PHPUnit
    runs-on: ubuntu-latest
    env:
      PATH: './modules/custom'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: $PATH

      - name: Run echo
        run: ls -la ./

      - name: Prepare environment
        uses: $PATH/.github/actions/drupal-docker

      - name: Run echo
        run: ls -la ./modules/custom
