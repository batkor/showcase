name: Main
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  phpunit:
    name: Run PHPUnit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare environment
        uses: './.github/actions/drupal-docker'
#        with:
#          directory: './web/modules/custom'

      - name: Run Drupal docker
        shell: bash
        run: docker compose up -d

      - name: Finished
        run: ls -la ./
